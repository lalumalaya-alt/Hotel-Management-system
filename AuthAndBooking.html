    function SearchableSelect({ value, onChange, options, placeholder, className, required, disabled }) {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState('');
      const wrapperRef = useRef(null);
      const searchRef = useRef(null);
      const normalized = (options || []).map(o => ({ value: String(o.value ?? ''), label: String(o.label ?? '') }));
      const selected = normalized.find(o => o.value === String(value ?? ''));
      const filtered = search.trim() ? normalized.filter(o => o.label.toLowerCase().includes(search.toLowerCase())) : normalized;
      useEffect(() => { if (!isOpen) return; const handler = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) { setIsOpen(false); setSearch(''); } }; document.addEventListener('mousedown', handler); return () => document.removeEventListener('mousedown', handler); }, [isOpen]);
      useEffect(() => { if (isOpen && searchRef.current) searchRef.current.focus(); }, [isOpen]);
      const toggle = () => { if (!disabled) { setIsOpen(o => !o); setSearch(''); } };
      const pick = (val) => { onChange(val); setIsOpen(false); setSearch(''); };
      return (
        <div className={'ss-wrapper' + (className ? ' ' + className : '')} ref={wrapperRef}>
          <div className={'ss-control' + (isOpen ? ' open' : '') + (disabled ? ' disabled' : '')} onClick={toggle}>
            <span className={'ss-value' + (selected ? '' : ' placeholder')}>{selected ? selected.label : (placeholder || 'Select...')}</span>
            <i className={'fas fa-chevron-down ss-arrow'}></i>
          </div>
          {isOpen && (
            <div className="ss-dropdown">
              <div className="ss-search-wrapper">
                <i className="fas fa-search ss-search-icon"></i>
                <input ref={searchRef} type="text" className="ss-search-input" placeholder="Search..." value={search} onChange={(e) => setSearch(e.target.value)} onClick={(e) => e.stopPropagation()} />
                {search && (<button className="ss-search-clear" onClick={(e) => { e.stopPropagation(); setSearch(''); }}><i className="fas fa-times"></i></button>)}
              </div>
              <div className="ss-options-list">
                {filtered.length === 0
                  ? <div className="ss-no-results"><i className="fas fa-search"></i> No results</div>
                  : filtered.map(o => (
                      <div key={o.value} className={'ss-option' + (o.value === String(value ?? '') ? ' selected' : '')} onClick={() => pick(o.value)}>
                        {o.value === String(value ?? '') && <i className="fas fa-check ss-check"></i>}
                        {o.label}
                      </div>
                    ))
                }
              </div>
            </div>
          )}
        </div>
      );
    }

    function LoginPage({onLogin}){

    function LoginForm({onLogin,setView}){
      const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [ld,setLd]=useState(false);
      const submit=(e)=>{e.preventDefault();setLd(true);setErr('');
        google.script.run.withSuccessHandler((r)=>{setLd(false);if(r.success)onLogin(r.username,r.role);else setErr(r.message);}).withFailureHandler((e)=>{setLd(false);setErr('Connection error: '+e.message);}).checkLogin(u,p);};
      return(
        <form onSubmit={submit}>
          <div className="form-group"><label>Username</label><input type="text" value={u} onChange={(e)=>setU(e.target.value)} required placeholder="Enter your email"/></div>
          <div className="form-group"><label>Password</label><input type="password" value={p} onChange={(e)=>setP(e.target.value)} required placeholder="Enter your password"/></div>
          <button type="submit" className="btn btn-primary" disabled={ld} style={{width:'100%'}}>{ld?<><i className="fas fa-spinner fa-spin"></i> Logging in...</>:<><i className="fas fa-sign-in-alt"></i> Login</>}</button>

            <span className="login-divider">|</span>

          </div>
        </form>
      );

    function SignUpForm({setView}){
      const [email,setEmail]=useState('');const [pw,setPw]=useState('');const [cpw,setCpw]=useState('');
      const [err,setErr]=useState('');const [ld,setLd]=useState(false);
      const submit=(e)=>{
        e.preventDefault();setErr('');
        const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!emailRegex.test(email)){setErr('Please enter a valid email address.');return;}
        if(pw.length<4){setErr('Password must be at least 4 characters.');return;}
        if(pw!==cpw){Swal.fire({icon:'error',text:'Passwords do not match.'});return;}
        setLd(true);
        google.script.run
          .withSuccessHandler((r)=>{setLd(false);if(r.success){Swal.fire({icon:'success',text:r.message,timer:2500,showConfirmButton:false});setTimeout(()=>setView('login'),2500);}else{setErr(r.message);}})
          .withFailureHandler((e)=>{setLd(false);setErr('Connection error: '+e.message);})
          .createAccount(email,pw);
      };
      return(
        <div>
          <button className="back-link" onClick={()=>setView('login')}><i className="fas fa-arrow-left"></i> Back to Login</button>
          <h3 style={{color:'var(--navy-primary)',marginBottom:'20px',fontSize:'20px'}}><i className="fas fa-user-plus"></i> Create Account</h3>
          <form onSubmit={submit}>
            <div className="form-group"><label>Email Address *</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="your.email@example.com"/></div>
            <div className="form-group"><label>Password * <span style={{fontWeight:400,color:'#999',fontSize:'12px'}}>(min 4 characters)</span></label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="Create a password"/></div>
            <div className="form-group"><label>Confirm Password *</label><input type="password" value={cpw} onChange={e=>setCpw(e.target.value)} required placeholder="Confirm your password"/></div>
            <button type="submit" className="btn btn-primary" disabled={ld} style={{width:'100%'}}>{ld?<><i className="fas fa-spinner fa-spin"></i> Creating Account...</>:<><i className="fas fa-user-plus"></i> Create Account</>}</button>
            {err&&<div className="error">{err}</div>}
          </form>
          <div className="login-links" style={{marginTop:'15px'}}><span style={{color:'#666'}}>Already have an account?</span> <a onClick={()=>setView('login')}>Login</a></div>
        </div>
      );
    }

          .withSuccessHandler((r)=>{
            setLd(false);
            if(r.success){Swal.fire({icon:'success',text:r.message,timer:2000,showConfirmButton:false});setStep(2);setTimer(60);setOtp(['','','','']);setTimeout(()=>{if(otpRefs[0].current)otpRefs[0].current.focus();},100);}
            else{setErr(r.message);}
          })
          .withFailureHandler((e)=>{setLd(false);setErr('Connection error: '+e.message);})
          .sendForgotPasswordOTP(email);
      };

      const handleOtpChange=(index,value)=>{
        if(value.length>1)value=value.slice(-1);
        if(value&&!/^\d$/.test(value))return;
        const newOtp=[...otp];newOtp[index]=value;setOtp(newOtp);
        if(value&&index<3&&otpRefs[index+1].current){otpRefs[index+1].current.focus();}
      };
      const handleOtpKeyDown=(index,e)=>{
        if(e.key==='Backspace'&&!otp[index]&&index>0&&otpRefs[index-1].current){otpRefs[index-1].current.focus();}
      };

      const verifyOtp=(e)=>{
        e.preventDefault();setErr('');
        const otpStr=otp.join('');
        if(otpStr.length!==4){setErr('Please enter the complete 4-digit OTP.');return;}
        setLd(true);
        google.script.run
          .withSuccessHandler((r)=>{setLd(false);if(r.success){Swal.fire({icon:'success',text:'OTP verified!',timer:1500,showConfirmButton:false});setStep(3);}else{setErr(r.message);}})
          .withFailureHandler((e)=>{setLd(false);setErr('Connection error: '+e.message);})
          .verifyOTP(email,otpStr);
      };

      const doReset=(e)=>{
        e.preventDefault();setErr('');
        if(newPw.length<4){setErr('Password must be at least 4 characters.');return;}
        if(newPw!==confPw){Swal.fire({icon:'error',text:'Passwords do not match.'});return;}
        setLd(true);
        const otpStr=otp.join('');
        google.script.run
          .withSuccessHandler((r)=>{setLd(false);if(r.success){Swal.fire({icon:'success',text:r.message,timer:2500,showConfirmButton:false});setTimeout(()=>setView('login'),2500);}else{setErr(r.message);}})
          .withFailureHandler((e)=>{setLd(false);setErr('Connection error: '+e.message);})
          .resetPassword(email,otpStr,newPw);
      };

      return(
        <div>
          <button className="back-link" onClick={()=>{if(step===1)setView('login');else{setStep(step-1);setErr('');}}}><i className="fas fa-arrow-left"></i> {step===1?'Back to Login':'Back'}</button>
          <h3 style={{color:'var(--navy-primary)',marginBottom:'10px',fontSize:'20px'}}><i className="fas fa-key"></i> Reset Password</h3>
          <div className="step-indicator">
            <div className={'step-dot'+(step>=1?' active':'')+(step>1?' completed':'')}></div>
            <div className={'step-dot'+(step>=2?' active':'')+(step>2?' completed':'')}></div>
            <div className={'step-dot'+(step>=3?' active':'')}></div>
          </div>

          {step===1&&(
            <form onSubmit={sendOtp}>
              <p style={{color:'#666',fontSize:'14px',marginBottom:'20px'}}>Enter the email address associated with your account. We'll send you a 4-digit OTP to reset your password.</p>
              <div className="form-group"><label>Email Address *</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="your.email@example.com"/></div>
              <button type="submit" className="btn btn-primary" disabled={ld} style={{width:'100%'}}>{ld?<><i className="fas fa-spinner fa-spin"></i> Sending OTP...</>:<><i className="fas fa-paper-plane"></i> Send OTP</>}</button>
              {err&&<div className="error">{err}</div>}
            </form>
          )}

          {step===2&&(
            <form onSubmit={verifyOtp}>
              <p style={{color:'#666',fontSize:'14px',marginBottom:'10px'}}>We sent a 4-digit code to <strong>{email}</strong></p>
              <div className="otp-inputs">
                {otp.map((digit,i)=>(
                  <input key={i} ref={otpRefs[i]} type="text" inputMode="numeric" maxLength="1" className="otp-input" value={digit} onChange={e=>handleOtpChange(i,e.target.value)} onKeyDown={e=>handleOtpKeyDown(i,e)} autoFocus={i===0}/>
                ))}
              </div>
              <button type="submit" className="btn btn-primary" disabled={ld} style={{width:'100%'}}>{ld?<><i className="fas fa-spinner fa-spin"></i> Verifying...</>:<><i className="fas fa-check-circle"></i> Verify OTP</>}</button>
              {err&&<div className="error">{err}</div>}
              <div className="timer-text">
                {timer>0?(<span>Resend OTP in <strong>{timer}s</strong></span>):(<button className="resend-link" type="button" onClick={sendOtp} disabled={ld}><i className="fas fa-redo"></i> Resend OTP</button>)}
              </div>
            </form>
          )}

          {step===3&&(
            <form onSubmit={doReset}>
              <p style={{color:'#666',fontSize:'14px',marginBottom:'20px'}}><i className="fas fa-check-circle" style={{color:'var(--success)'}}></i> OTP verified for <strong>{email}</strong>. Enter your new password below.</p>
              <div className="form-group"><label>New Password * <span style={{fontWeight:400,color:'#999',fontSize:'12px'}}>(min 4 characters)</span></label><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} required placeholder="Enter new password"/></div>
              <div className="form-group"><label>Confirm New Password *</label><input type="password" value={confPw} onChange={e=>setConfPw(e.target.value)} required placeholder="Confirm new password"/></div>
              <button type="submit" className="btn btn-primary" disabled={ld} style={{width:'100%'}}>{ld?<><i className="fas fa-spinner fa-spin"></i> Resetting...</>:<><i className="fas fa-save"></i> Reset Password</>}</button>
              {err&&<div className="error">{err}</div>}
            </form>
          )}

          <div className="login-links" style={{marginTop:'15px'}}><span style={{color:'#666'}}>Remember your password?</span> <a onClick={()=>setView('login')}>Login</a></div>
        </div>
      );
    }

      const [ld,setLd]=useState(true);const [show,setShow]=useState(false);const [edit,setEdit]=useState(null);const tRef=useRef(null);

      const initT=(data)=>{if(tRef.current){try{tRef.current.destroy();tRef.current=null;$('#roomsT').empty();}catch(e){}}
        setTimeout(()=>{try{const t=$('#roomsT').DataTable({data,destroy:true,columns:[{data:'roomNo',title:'Room No'},{data:'roomType',title:'Type'},{data:'roomRate',title:'Rate/Night',render:d=>fmtCur(d)},{data:'roomStatus',title:'Status',render:d=>`<span class="status-badge ${statusCls(d)}">${d}</span>`},{data:null,title:'Actions',orderable:false,className:'all',responsivePriority:1,render:()=>'<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}],pageLength:10,lengthMenu:[[10,25,50,-1],[10,25,50,"All"]],responsive:true,dom:'Blfrtip',buttons:[{extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},{extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},{extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}],order:[[0,'asc']]});$('#roomsT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();if(a==='edit'){setEdit(rd);setShow(true);}else delRoom(rd);});tRef.current=t;}catch(e){Swal.fire({icon:'error',text:e.message});}},150);};

            {extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}
          ],order:[[0,'desc']]});
          $('#bkT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();if(a==='edit'){setEditBooking(rd);setShow(true);}else if(a==='delete'){Swal.fire({icon:'warning',title:'Delete Booking?',text:'Ticket '+rd.ticketId+' (Room #'+rd.roomNo+') will be permanently deleted and the room will be freed.',showCancelButton:true,confirmButtonColor:'#ea4335',confirmButtonText:'Delete',cancelButtonText:'Cancel'}).then(res=>{if(res.isConfirmed){Swal.fire({title:'Deleting...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});google.script.run.withSuccessHandler(r=>{Swal.close();if(r.success){Swal.fire({icon:'success',text:r.message,timer:2000,showConfirmButton:false});setTimeout(()=>load(),100);}else Swal.fire({icon:'error',text:r.message});}).withFailureHandler(e=>{Swal.close();Swal.fire({icon:'error',text:e.message});}).deleteBooking(rd.rowIndex);}});}});
          tRef.current=t;}catch(e){console.error(e);}},150);};
      useEffect(()=>{if(!tRef.current||bks.length===0)return;
        $.fn.dataTable.ext.search=[];
        $.fn.dataTable.ext.search.push(function(settings,searchData,idx){
          const row=bks[idx];if(!row)return true;
          if(filters.dateFrom){const d=new Date(row.checkIn);if(d<new Date(filters.dateFrom))return false;}
          if(filters.dateTo){const d=new Date(row.checkIn);if(d>new Date(filters.dateTo+'T23:59:59'))return false;}
          return true;
        });
        if(filters.status)tRef.current.column(5).search(filters.status);else tRef.current.column(5).search('');
        if(filters.paymentStatus)tRef.current.column(6).search(filters.paymentStatus);else tRef.current.column(6).search('');
        if(filters.payment)tRef.current.column(7).search(filters.payment);else tRef.current.column(7).search('');
        tRef.current.draw();
      },[filters]);
      const clearF=()=>{setFilters({dateFrom:'',dateTo:'',status:'',payment:'',paymentStatus:''});if(tRef.current){$.fn.dataTable.ext.search=[];tRef.current.columns().search('').draw();}};
      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-calendar-check"></i> Bookings</h2><button className="btn btn-success" onClick={()=>{setEditBooking(null);setShow(true);}}><i className="fas fa-plus"></i> New Booking</button></div>
        {!ld&&<div className="filters-section"><div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearF}><i className="fas fa-times-circle"></i> Clear All</button></div><div className="filters-grid">
          <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={e=>setFilters({...filters,dateFrom:e.target.value})}/></div>
          <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={e=>setFilters({...filters,dateTo:e.target.value})}/></div>
          <div className="filter-group"><label><i className="fas fa-check-circle"></i> Status</label><select className="filter-input" value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})}><option value="">All</option><option>Booked</option><option>Checked Out</option></select></div>
          <div className="filter-group"><label><i className="fas fa-money-bill-wave"></i> Pay Status</label><select className="filter-input" value={filters.paymentStatus} onChange={e=>setFilters({...filters,paymentStatus:e.target.value})}><option value="">All</option><option>Paid</option><option>Partial</option><option>Unpaid</option></select></div>
          <div className="filter-group"><label><i className="fas fa-credit-card"></i> Method</label><select className="filter-input" value={filters.payment} onChange={e=>setFilters({...filters,payment:e.target.value})}><option value="">All</option><option>Cash</option><option>Card</option><option>Bank Transfer</option><option>Online</option></select></div>
        </div></div>}
        {ld&&<TableSkeleton rows={6} columns={8}/>}<div style={{display:ld?'none':'block'}}><table id="bkT" className="display" style={{width:'100%'}}></table></div>
        {show&&<BookingModal rooms={rooms} booking={editBooking} onClose={()=>{setShow(false);setEditBooking(null);}} onBooked={load} role={role}/>}
      </div>);
    }


</script>
