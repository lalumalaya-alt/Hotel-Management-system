<script type="text/babel">

    function CheckInView({user,role}){
      const [mode,setMode]=useState('');
      const [rooms,setRooms]=useState([]);
      const [selectedRooms,setSelectedRooms]=useState([]);
      const [origRooms,setOrigRooms]=useState([]);
      const [pendingBookings,setPendingBookings]=useState([]);
      const [selBooking,setSelBooking]=useState('');
      const [linkedBooking,setLinkedBooking]=useState(null);
      const [ld,setLd]=useState(true);
      const [saving,setSaving]=useState(false);
      const tRef=useRef(null);
      const [fd,setFd]=useState({guestName:'',companyName:'',gstNumber:'',identityProof:'',mobile:'',email:'',address:'',purposeOfVisit:'',checkInDate:new Date().toISOString().split('T')[0],checkInTime:'14:00',checkOutDate:'',checkOutTime:'12:00',pax:1,advancePaid:0,extraPerson:0,foodPlan:'None',gstType:'Excluding',fixRoomRent:'No',fixRoomRentAmount:0,billTo:'Individual',discountPercent:0});

      useEffect(()=>{
        google.script.run.withSuccessHandler(r=>{setRooms(Array.isArray(r)?r:[]);}).withFailureHandler(()=>{}).getAllRooms();
        loadCheckIns();
        return()=>{if(tRef.current)try{tRef.current.destroy();}catch(e){}};
      },[]);

      const loadCheckIns=()=>{setLd(true);google.script.run.withSuccessHandler(r=>{setLd(false);initT(Array.isArray(r)?r:[]);}).withFailureHandler(e=>{setLd(false);Swal.fire({icon:'error',text:e.message});}).getAllCheckIns();};

      const initT=(data)=>{if(tRef.current){try{tRef.current.destroy();tRef.current=null;$('#ciT').empty();}catch(e){}}
        setTimeout(()=>{try{const t=$('#ciT').DataTable({data,destroy:true,columns:[
          {data:'checkInId',title:'ID'},{data:'guestName',title:'Guest'},{data:'roomNumbers',title:'Rooms'},{data:'mobile',title:'Phone'},
          {data:'checkInDate',title:'Check-In',render:d=>fmtDate(d)},{data:'checkOutDate',title:'Expected Out',render:d=>d?fmtDate(d):'-'},
          {data:'pax',title:'Pax'},{data:'status',title:'Status',render:d=>'<span class="status-badge status-'+(d||'active').toLowerCase().replace(/\s+/g,'-')+'">'+d+'</span>'}
        ],pageLength:10,responsive:true,dom:'Blfrtip',buttons:[
          {extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},
          {extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},
          {extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}
        ],order:[[0,'desc']]});tRef.current=t;}catch(e){console.error(e);}},150);};

      const toggleRoom=(rn)=>{setSelectedRooms(prev=>prev.includes(rn)?prev.filter(r=>r!==rn):[...prev,rn]);};

      // Load pending bookings when mode becomes advance
      useEffect(()=>{if(mode==='advance'){google.script.run.withSuccessHandler(r=>{setPendingBookings(Array.isArray(r)?r:[]);}).getPendingBookings();}},[mode]);

      const pickBooking=(val)=>{
        setSelBooking(val);
        if(!val){ resetForm(true); return; }
        const bk=pendingBookings.find(x=>x.ticketId===val);
        if(bk){
          setLinkedBooking(bk);
          const bkRooms=bk.roomNo?bk.roomNo.split(',').map(r=>r.trim()).filter(r=>r):[];
          setSelectedRooms(bkRooms);
          setOrigRooms(bkRooms);
          setFd(p=>({...p,guestName:bk.guestName||'',mobile:bk.phone||'',email:bk.email||'',checkInDate:bk.checkIn?bk.checkIn.split('T')[0]:p.checkInDate,checkInTime:bk.checkInTime||'14:00',checkOutDate:bk.checkOut?bk.checkOut.split('T')[0]:'',checkOutTime:bk.checkOutTime||'12:00',foodPlan:bk.foodPlan||'None',advancePaid:bk.advancePaid||0}));
        }
      };

      const resetForm=(keepMode=false)=>{setFd({guestName:'',companyName:'',gstNumber:'',identityProof:'',mobile:'',email:'',address:'',purposeOfVisit:'',checkInDate:new Date().toISOString().split('T')[0],checkInTime:'14:00',checkOutDate:'',checkOutTime:'12:00',pax:1,advancePaid:0,extraPerson:0,foodPlan:'None',gstType:'Excluding',fixRoomRent:'No',fixRoomRentAmount:0,billTo:'Individual',discountPercent:0});setSelectedRooms([]);setOrigRooms([]);setLinkedBooking(null);setSelBooking('');if(!keepMode)setMode('');};

      const submit=(e)=>{e.preventDefault();
        if(!fd.guestName.trim()){Swal.fire({icon:'warning',text:'Guest Name is required.'});return;}
        if(selectedRooms.length===0){Swal.fire({icon:'warning',text:'Select at least one room.'});return;}
        if(!fd.checkInDate){Swal.fire({icon:'warning',text:'Check-in date is required.'});return;}
        setSaving(true);Swal.fire({title:'Processing Check-In...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        google.script.run.withSuccessHandler(res=>{Swal.close();setSaving(false);
          if(res.success){Swal.fire({icon:'success',title:'Check-In Successful!',text:res.message,timer:2500,showConfirmButton:false});resetForm();loadCheckIns();
            google.script.run.withSuccessHandler(r=>{setRooms((Array.isArray(r)?r:[]).filter(rm=>(rm.roomStatus||'').toLowerCase()==='available'));}).getAllRooms();
          }else Swal.fire({icon:'error',text:res.message});
        }).withFailureHandler(e=>{Swal.close();setSaving(false);Swal.fire({icon:'error',text:e.message});}).addCheckIn({
          linkedTicketId:linkedBooking?linkedBooking.ticketId:'',guestName:fd.guestName,companyName:fd.companyName,gstNumber:fd.gstNumber,identityProof:fd.identityProof,mobile:fd.mobile,email:fd.email,address:fd.address,purposeOfVisit:fd.purposeOfVisit,checkInDate:fd.checkInDate,checkInTime:fd.checkInTime,checkOutDate:fd.checkOutDate,checkOutTime:fd.checkOutTime,roomNumbers:selectedRooms.join(','),pax:fd.pax,advancePaid:fd.advancePaid,extraPerson:fd.extraPerson,foodPlan:fd.foodPlan,gstType:fd.gstType,fixRoomRent:fd.fixRoomRent,fixRoomRentAmount:fd.fixRoomRentAmount,billTo:fd.billTo,discountPercent:fd.discountPercent
        });
      };

      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-door-open"></i> Check-In</h2><div style={{display:'flex',gap:'10px'}}><button className="btn btn-secondary" onClick={()=>resetForm(false)}><i className="fas fa-eraser"></i> Clear</button><button className="btn btn-primary" onClick={()=>{loadCheckIns();google.script.run.withSuccessHandler(r=>{setRooms(Array.isArray(r)?r:[]);}).getAllRooms();}}><i className="fas fa-sync"></i> Refresh</button></div></div>

        <div style={{marginBottom:'20px',background:'#f8f9fa',padding:'20px',borderRadius:'6px',border:'1px solid #dee2e6'}}>
          <div className="form-group" style={{maxWidth:'300px',marginBottom:mode==='advance'?'15px':'0'}}><label>Select Check-In Mode</label>
            <select value={mode} onChange={(e)=>{setMode(e.target.value);resetForm(true);}} style={{padding:'10px',fontSize:'15px',width:'100%',borderRadius:'4px',border:'1px solid #ccc'}}>
              <option value="" disabled>Please select</option>
              <option value="advance">Advance booking</option>
              <option value="walkin">Walk-in</option>
            </select>
          </div>

          {mode==='advance'&&<div className="form-group" style={{maxWidth:'600px',marginBottom:'0'}}>
            <label><i className="fas fa-search"></i> Select Advance Booking</label>
            <SearchableSelect value={selBooking} onChange={pickBooking} options={[{value:'',label:'-- Select Booking --'},...pendingBookings.map(b=>({value:b.ticketId,label:b.guestName+' ('+b.ticketId+') - Rooms: '+b.roomNo}))]} placeholder="Search by guest name or ticket ID..." />
            {linkedBooking&&<div style={{marginTop:'10px',padding:'10px',background:'#d4edda',borderRadius:'4px',color:'#155724',fontSize:'14px'}}><i className="fas fa-check-circle"></i> Linked to booking: <strong>{linkedBooking.ticketId}</strong> — {linkedBooking.guestName}</div>}
          </div>}
        </div>

        {mode!==''&&<form onSubmit={submit}>
          <div className="form-grid">
            <div className="form-group"><label>Guest Name *</label><input value={fd.guestName} onChange={e=>setFd({...fd,guestName:e.target.value})} required/></div>
            <div className="form-group"><label>Company Name</label><input value={fd.companyName} onChange={e=>setFd({...fd,companyName:e.target.value})}/></div>
            <div className="form-group"><label>GST Number</label><input value={fd.gstNumber} onChange={e=>setFd({...fd,gstNumber:e.target.value})}/></div>
            <div className="form-group"><label>Identity Proof</label><input value={fd.identityProof} onChange={e=>setFd({...fd,identityProof:e.target.value})} placeholder="Aadhar/Passport No."/></div>
            <div className="form-group"><label>Mobile</label><input value={fd.mobile} onChange={e=>setFd({...fd,mobile:e.target.value})}/></div>
            <div className="form-group"><label>Email</label><input type="email" value={fd.email} onChange={e=>setFd({...fd,email:e.target.value})}/></div>
            <div className="form-group" style={{gridColumn:'1/-1'}}><label>Address</label><input value={fd.address} onChange={e=>setFd({...fd,address:e.target.value})}/></div>
            <div className="form-group"><label>Purpose of Visit</label><input value={fd.purposeOfVisit} onChange={e=>setFd({...fd,purposeOfVisit:e.target.value})}/></div>
            <div className="form-group"><label>Check-In Date *</label><input type="date" value={fd.checkInDate} onChange={e=>setFd({...fd,checkInDate:e.target.value})} required/></div>
            <div className="form-group"><label>Check-In Time</label><input type="time" value={fd.checkInTime} onChange={e=>setFd({...fd,checkInTime:e.target.value})}/></div>
            <div className="form-group"><label>Expected Check-Out Date</label><input type="date" value={fd.checkOutDate} onChange={e=>setFd({...fd,checkOutDate:e.target.value})}/></div>
            <div className="form-group"><label>Check-Out Time</label><input type="time" value={fd.checkOutTime} onChange={e=>setFd({...fd,checkOutTime:e.target.value})}/></div>
            <div className="form-group"><label>Pax</label><input type="number" min="1" value={fd.pax} onChange={e=>setFd({...fd,pax:e.target.value})}/></div>
            <div className="form-group"><label>Extra Person</label><input type="number" min="0" value={fd.extraPerson} onChange={e=>setFd({...fd,extraPerson:e.target.value})}/></div>
            <div className="form-group"><label>Advance Paid ({APP_CURRENCY})</label><input type="number" step="0.01" min="0" value={fd.advancePaid} onChange={e=>setFd({...fd,advancePaid:e.target.value})}/></div>
            <div className="form-group"><label>Food Plan</label><select value={fd.foodPlan} onChange={e=>setFd({...fd,foodPlan:e.target.value})}><option value="None">None</option><option value="Including Breakfast">Including Breakfast</option><option value="Including Breakfast and Dinner">Including Breakfast and Dinner</option></select></div>
            <div className="form-group"><label>GST</label><select value={fd.gstType} onChange={e=>setFd({...fd,gstType:e.target.value})}><option value="Excluding">Excluding GST</option><option value="Including">Including GST</option></select></div>
            <div className="form-group"><label>Bill To</label><select value={fd.billTo} onChange={e=>setFd({...fd,billTo:e.target.value})}><option value="Individual">Individual</option><option value="Company">Company</option><option value="Agent">Agent</option></select></div>
            <div className="form-group"><label>Discount %</label><input type="number" step="0.01" min="0" max="100" value={fd.discountPercent} onChange={e=>setFd({...fd,discountPercent:e.target.value})}/></div>
            <div className="form-group"><label>Fix Room Rent</label><select value={fd.fixRoomRent} onChange={e=>setFd({...fd,fixRoomRent:e.target.value})}><option value="No">No</option><option value="Yes">Yes</option></select></div>
            {fd.fixRoomRent==='Yes'&&<div className="form-group"><label>Fixed Rent Amount ({APP_CURRENCY})</label><input type="number" step="0.01" min="0" value={fd.fixRoomRentAmount} onChange={e=>setFd({...fd,fixRoomRentAmount:e.target.value})}/></div>}
          </div>

          <div style={{marginBottom:'15px'}}><label style={{display:'block',marginBottom:'8px',color:'#555',fontWeight:500,fontSize:'14px'}}>Select Rooms * ({selectedRooms.length} selected)</label>
            <div className="room-tiles-grid">{rooms.filter(rm=>(rm.roomStatus||'').toLowerCase()==='available'||origRooms.includes(rm.roomNo.toString())).map(rm=><div key={rm.roomNo} className={'room-tile'+(selectedRooms.includes(rm.roomNo.toString())?' multi-selected':'')} onClick={()=>toggleRoom(rm.roomNo.toString())}>
              <div className="room-number">#{rm.roomNo}</div><div className="room-type">{rm.roomType}</div><div className="room-rate">{fmtCur(rm.roomRate)}/night</div>
            </div>)}</div>
          </div>

          <div className="form-actions"><button type="submit" className="btn btn-primary" disabled={saving}>{saving?<><i className="fas fa-spinner fa-spin"></i> Processing...</>:<><i className="fas fa-door-open"></i> Complete Check-In</>}</button><button type="button" className="btn btn-secondary" onClick={resetForm}><i className="fas fa-undo"></i> Reset</button></div>
        </form>}

        <div style={{marginTop:'30px'}}><h3 style={{marginBottom:'15px',color:'var(--navy-primary)'}}><i className="fas fa-list"></i> All Check-Ins</h3>
          {ld&&<TableSkeleton rows={5} columns={8}/>}<div style={{display:ld?'none':'block'}}><table id="ciT" className="display" style={{width:'100%'}}></table></div>
        </div>
      </div>);
    }

    function RestaurantView({user}){
      const [activeRooms,setActiveRooms]=useState([]);
      const [selRoom,setSelRoom]=useState('');
      const [selCheckIn,setSelCheckIn]=useState('');
      const [selGuestName,setSelGuestName]=useState('');
      const [ld,setLd]=useState(true);
      const [saving,setSaving]=useState(false);
      const [editOrder,setEditOrder]=useState(null);
      const tRef=useRef(null);
      const CATEGORIES=['FoodBeverage','ExtraBed','MiniBar','EarlyClean','Xerox','Laundry','Fax','SPBUC','Travels','Misc'];
      const CAT_LABELS={FoodBeverage:'Food & Beverage',ExtraBed:'Extra Bed',MiniBar:'Mini Bar',EarlyClean:'Early Clean',Xerox:'Xerox',Laundry:'Laundry',Fax:'Fax',SPBUC:'SP/BUC',Travels:'Travels',Misc:'Miscellaneous'};
      const [fd,setFd]=useState({category:'FoodBeverage',description:'',amount:'',orderDate:new Date().toISOString().split('T')[0]});

      useEffect(()=>{
        google.script.run.withSuccessHandler(r=>{setActiveRooms(Array.isArray(r)?r:[]);}).withFailureHandler(()=>{}).getActiveCheckInRooms();
        loadOrders();
        return()=>{if(tRef.current)try{tRef.current.destroy();}catch(e){}};
      },[]);

      const loadOrders=()=>{setLd(true);google.script.run.withSuccessHandler(r=>{setLd(false);initT(Array.isArray(r)?r:[]);}).withFailureHandler(e=>{setLd(false);Swal.fire({icon:'error',text:e.message});}).getAllFoodOrders();};

      const initT=(data)=>{if(tRef.current){try{tRef.current.destroy();tRef.current=null;$('#restT').empty();}catch(e){}}
        setTimeout(()=>{try{const t=$('#restT').DataTable({data,destroy:true,columns:[
          {data:'orderId',title:'Order ID'},{data:'roomNo',title:'Room'},{data:'checkInId',title:'Check-In'},
          {data:'orderDate',title:'Date',render:d=>fmtDate(d)},{data:'category',title:'Category',render:d=>CAT_LABELS[d]||d},
          {data:'description',title:'Description'},{data:'amount',title:'Amount',render:d=>fmtCur(d)},
          {data:'status',title:'Status',render:d=>'<span class="status-badge status-'+(d||'active').toLowerCase()+'">'+d+'</span>'},
          {data:null,title:'Actions',orderable:false,className:'all',responsivePriority:1,render:()=>'<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}
        ],pageLength:10,responsive:true,dom:'Blfrtip',buttons:[
          {extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},
          {extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},
          {extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}
        ],order:[[0,'desc']]});
        $('#restT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();if(a==='edit'){setEditOrder(rd);setSelRoom(rd.roomNo);setSelCheckIn(rd.checkInId);setFd({category:rd.category,description:rd.description,amount:rd.amount,orderDate:rd.orderDate?rd.orderDate.split('T')[0]:''});}else if(a==='delete')delOrder(rd);});
        tRef.current=t;}catch(e){console.error(e);}},150);};

      const pickRoom=(rn)=>{setSelRoom(rn);const rm=activeRooms.find(r=>r.roomNo===rn);if(rm){setSelCheckIn(rm.checkInId);setSelGuestName(rm.guestName);}else{setSelCheckIn('');setSelGuestName('');}};

      const submit=(e)=>{e.preventDefault();
        if(!selRoom){Swal.fire({icon:'warning',text:'Select a room first.'});return;}
        if(!fd.amount||parseFloat(fd.amount)<=0){Swal.fire({icon:'warning',text:'Enter a valid amount.'});return;}
        setSaving(true);
        if(editOrder){
          google.script.run.withSuccessHandler(res=>{setSaving(false);if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});resetOrderForm();loadOrders();}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>{setSaving(false);Swal.fire({icon:'error',text:e.message});}).updateFoodOrder(editOrder.rowIndex,{roomNo:selRoom,checkInId:selCheckIn,orderDate:fd.orderDate,category:fd.category,description:fd.description,amount:fd.amount,status:'Active'});
        }else{
          google.script.run.withSuccessHandler(res=>{setSaving(false);if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});resetOrderForm();loadOrders();}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>{setSaving(false);Swal.fire({icon:'error',text:e.message});}).addFoodOrder({roomNo:selRoom,checkInId:selCheckIn,orderDate:fd.orderDate,category:fd.category,description:fd.description,amount:fd.amount});
        }
      };

      const delOrder=(ord)=>{Swal.fire({icon:'warning',title:'Delete Order?',text:'Delete order '+ord.orderId+'?',showCancelButton:true,confirmButtonColor:'#ea4335',confirmButtonText:'Delete'}).then(r=>{if(r.isConfirmed)google.script.run.withSuccessHandler(res=>{if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});loadOrders();}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>Swal.fire({icon:'error',text:e.message})).deleteFoodOrder(ord.rowIndex);});};

      const resetOrderForm=()=>{setEditOrder(null);setFd({category:'FoodBeverage',description:'',amount:'',orderDate:new Date().toISOString().split('T')[0]});};

      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-utensils"></i> Restaurant / Services</h2><button className="btn btn-primary" onClick={()=>{loadOrders();google.script.run.withSuccessHandler(r=>{setActiveRooms(Array.isArray(r)?r:[]);}).getActiveCheckInRooms();}}><i className="fas fa-sync"></i> Refresh</button></div>
        <div style={{background:'#f8f9fa',padding:'20px',borderRadius:'4px',border:'1px solid #dee2e6',marginBottom:'20px'}}>
          <h4 style={{color:'var(--navy-primary)',marginBottom:'15px'}}><i className="fas fa-plus-circle"></i> {editOrder?'Edit':'Add New'} Order</h4>
          <form onSubmit={submit}>
            <div className="form-grid">
              <div className="form-group"><label>Room *</label><select value={selRoom} onChange={e=>pickRoom(e.target.value)}><option value="">{activeRooms.length===0?'No active check-ins found':'Select Room'}</option>{activeRooms.map(rm=><option key={rm.roomNo} value={rm.roomNo}>#{rm.roomNo} — {rm.guestName}</option>)}</select>{activeRooms.length===0&&<small style={{color:'#e74c3c',fontSize:'12px'}}><i className="fas fa-info-circle"></i> Check in guests first from the Check-In page.</small>}</div>
              <div className="form-group"><label>Category *</label><select value={fd.category} onChange={e=>setFd({...fd,category:e.target.value})}>{CATEGORIES.map(c=><option key={c} value={c}>{CAT_LABELS[c]}</option>)}</select></div>
              <div className="form-group"><label>Description</label><input value={fd.description} onChange={e=>setFd({...fd,description:e.target.value})} placeholder="Item description"/></div>
              <div className="form-group"><label>Amount ({APP_CURRENCY}) *</label><input type="number" step="0.01" min="0" value={fd.amount} onChange={e=>setFd({...fd,amount:e.target.value})} required/></div>
              <div className="form-group"><label>Date</label><input type="date" value={fd.orderDate} onChange={e=>setFd({...fd,orderDate:e.target.value})}/></div>
            </div>
            {selGuestName&&<p style={{fontSize:'13px',color:'#666',marginBottom:'10px'}}><i className="fas fa-info-circle"></i> Guest: <strong>{selGuestName}</strong> | Check-In: <strong>{selCheckIn}</strong></p>}
            <div className="form-actions"><button type="submit" className="btn btn-primary" disabled={saving}>{saving?<><i className="fas fa-spinner fa-spin"></i> Saving...</>:<><i className="fas fa-save"></i> {editOrder?'Update':'Add'} Order</>}</button>{editOrder&&<button type="button" className="btn btn-secondary" onClick={resetOrderForm}><i className="fas fa-times"></i> Cancel Edit</button>}</div>
          </form>
        </div>
        <h3 style={{marginBottom:'15px',color:'var(--navy-primary)'}}><i className="fas fa-list"></i> All Orders</h3>
        {ld&&<TableSkeleton rows={5} columns={8}/>}<div style={{display:ld?'none':'block'}}><table id="restT" className="display" style={{width:'100%'}}></table></div>
      </div>);
    }

    function HotelInvoiceModal({data,onClose}){
      const d=data;
      const fmtD=(dt)=>{if(!dt)return'-';const dd=new Date(dt);return dd.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});};
      const fmtDShort=(dt)=>{if(!dt)return'-';const dd=new Date(dt);return dd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});};
      const n2=(v)=>(parseFloat(v)||0).toFixed(2);
      const cats=['extraBed','foodBev','miniBar','earlyClean','xerox','laundry','fax','spbuc','travels','misc'];
const allCatHeaders=['E.Bed','Fds&Bvg','MiniBar','ErlyCln','Xerox','Laundry','Fax','SP/BUC','Travels','Misc'];
      const colTotals={};cats.forEach(c=>colTotals[c]=0);let totalRoomsCol=0;
      (d.dayByDay||[]).forEach(row=>{totalRoomsCol+=row.rooms||0;cats.forEach(c=>colTotals[c]+=row[c]||0);});

      const planLabel=(fp)=>{if(!fp||fp==='None')return'EP';if(fp.indexOf('Dinner')!==-1)return'MAP';return'CP';};

      const numToWords=(num)=>{
        if(!num||num===0)return'Zero';
        const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
        const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        num=Math.round(Math.abs(num));
        const w=(n)=>{if(n<20)return ones[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');if(n<1000)return ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+w(n%100):'');if(n<100000)return w(Math.floor(n/1000))+' Thousand'+(n%1000?' '+w(n%1000):'');if(n<10000000)return w(Math.floor(n/100000))+' Lakh'+(n%100000?' '+w(n%100000):'');return w(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+w(n%10000000):'');};
        return'Rupees '+w(num)+' Only';
      };

      const doPrint=()=>{window.print();};

      const doPdf=()=>{
        const dayRows=(d.dayByDay||[]).map(row=>[fmtDShort(row.date),n2(row.rooms),n2(row.extraBed),n2(row.foodBev),n2(row.miniBar),n2(row.earlyClean),n2(row.xerox),n2(row.laundry),n2(row.fax),n2(row.spbuc),n2(row.travels),n2(row.misc),n2(row.dayTotal),n2(row.grandTotal)]);
        const totRow=['Totals',n2(totalRoomsCol),...cats.map(c=>n2(colTotals[c])),n2(d.subtotal||0),''];
        const doc={pageSize:'A4',pageOrientation:'landscape',pageMargins:[20,20,20,20],content:[
          {text:d.hotelName||'Hill View Eco Retreat',style:'hdr',alignment:'center'},{text:(d.hotelAddress||'')+' | '+(d.hotelPhone||'')+' | '+(d.hotelEmail||''),alignment:'center',fontSize:9,margin:[0,0,0,5]},
          d.hotelTIN?{text:'GSTIN: '+d.hotelTIN,alignment:'center',fontSize:9,margin:[0,0,0,8]}:{text:'',margin:[0,0,0,8]},
          {columns:[{width:'60%',text:[{text:'Guest: ',bold:true},d.guestName+'\n',d.companyName?{text:'Company: '+d.companyName+'\n'}:'',d.address?{text:'Address: '+d.address+'\n'}:'',d.gstNumber?{text:'GSTIN: '+d.gstNumber+'\n'}:'',{text:'Mobile: '+(d.mobile||'-')+'\n'}],fontSize:10},{width:'40%',table:{widths:['auto','*'],body:[['Bill No#',d.billNumber||''],['GR No',d.checkInId||''],['Check In',fmtD(d.checkInDate)+' '+d.checkInTime],['Check Out',fmtD(d.checkOutDate)+' '+d.checkOutTime],['Plan',planLabel(d.foodPlan)],['Pax#',(d.pax||1).toString()],['Room#',(d.numberOfRooms||1).toString()]]},fontSize:9}]},
          {text:'\n'},{table:{headerRows:1,widths:['auto','auto','auto','auto','auto','auto','auto','auto','auto','auto','auto','auto','auto','auto'],body:[[{text:'Date',style:'th'},{text:'Rooms',style:'th'},{text:'E.Bed',style:'th'},{text:'Fds&Bvg',style:'th'},{text:'MiniBar',style:'th'},{text:'ErlyCln',style:'th'},{text:'Xerox',style:'th'},{text:'Laundry',style:'th'},{text:'Fax',style:'th'},{text:'SP/BUC',style:'th'},{text:'Travels',style:'th'},{text:'Misc',style:'th'},{text:'Day Total',style:'th'},{text:'Gr.Total',style:'th'}],...dayRows,totRow.map((v,i)=>i===0?{text:v,bold:true}:{text:v,bold:true})]},fontSize:8},
          {text:'\n'},{columns:[{width:'60%',text:''},{width:'40%',table:{widths:['*','auto'],body:[['Total Amount',{text:n2(d.subtotal||0),alignment:'right'}],['Discount ('+n2(d.discountPercent||0)+'%)',{text:'- '+n2(d.discountAmount||0),alignment:'right'}],['SGST '+n2(d.sgstPercent||0)+'%',{text:n2(d.sgstAmount||0),alignment:'right'}],['CGST '+n2(d.cgstPercent||0)+'%',{text:n2(d.cgstAmount||0),alignment:'right'}],['Bill Amount',{text:n2(d.billAmount||0),alignment:'right',bold:true}],['Less Advance',{text:'- '+n2(d.advancePaid||0),alignment:'right'}],[{text:'Net Amount',bold:true},{text:n2(d.netAmount||0),alignment:'right',bold:true,fontSize:12}]]},fontSize:10}]},
          {text:'\nRooms: '+(d.roomNumbers||''),fontSize:9,margin:[0,5,0,0]},{text:numToWords(d.billAmount||0),italics:true,fontSize:10,margin:[0,5,0,20]},
          {columns:[{text:'Guest\'s Signature\n_______________',alignment:'center',fontSize:9},{text:'PLEASE DEPOSIT YOUR KEY',alignment:'center',fontSize:9,bold:true},{text:'Admin / Front Office\n_______________',alignment:'center',fontSize:9}]}
        ],styles:{hdr:{fontSize:18,bold:true,color:'#001f3f'},th:{bold:true,fontSize:8,color:'white',fillColor:'#001f3f',alignment:'center'}},defaultStyle:{fontSize:10}};
        pdfMake.createPdf(doc).download('Invoice-'+(d.billNumber||d.checkInId)+'.pdf');
      };

      return(<div className="modal-overlay" onClick={onClose}><div className="modal" style={{maxWidth:'1050px',width:'95%'}} onClick={e=>e.stopPropagation()}><div className="modal-header no-print"><h3><i className="fas fa-file-invoice"></i> Hotel Invoice</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body" style={{padding:'15px'}}>
        <div className="hotel-invoice">
          <div className="hotel-invoice-header">
            {d.hotelLogo&&<img src={d.hotelLogo} className="hotel-logo" alt="Logo"/>}

            <div style={{width:'60px'}}></div>
          </div>
          <div className="invoice-meta-section">
            <div className="invoice-guest-details">
              <p><strong>Guest:</strong> {d.guestName}</p>
              {d.companyName&&<p><strong>Company:</strong> {d.companyName}</p>}
              {d.address&&<p><strong>Address:</strong> {d.address}</p>}
              {d.gstNumber&&<p><strong>GSTIN:</strong> {d.gstNumber}</p>}
              <p><strong>Mobile:</strong> {d.mobile||'-'}</p>
              {d.email&&<p><strong>Email:</strong> {d.email}</p>}
              <p><strong>Bill To:</strong> {d.billTo||'Individual'}</p>
            </div>
            <div className="invoice-bill-info"><table><tbody>
              <tr><td>Bill No#</td><td>{d.billNumber||'-'}</td></tr>
              <tr><td>GR No</td><td>{d.checkInId||'-'}</td></tr>
              <tr><td>Check In</td><td>{fmtD(d.checkInDate)} {d.checkInTime||''}</td></tr>
              <tr><td>Check Out</td><td>{fmtD(d.checkOutDate)} {d.checkOutTime||''}</td></tr>
              <tr><td>Plan</td><td>{planLabel(d.foodPlan)}</td></tr>
              <tr><td>Pax#</td><td>{d.pax||1}</td></tr>
              <tr><td>Room#</td><td>{d.numberOfRooms||1}</td></tr>
            </tbody></table></div>
          </div>
          <table className="invoice-day-table"><thead><tr><th>Date</th><th>Rooms</th>{allCatHeaders.map(h=><th key={h}>{h}</th>)}<th>Days Total</th><th>Gr.Total</th></tr></thead>
            <tbody>{(d.dayByDay||[]).map((row,i)=><tr key={i}><td style={{textAlign:'center'}}>{fmtDShort(row.date)}</td><td>{n2(row.rooms)}</td><td>{n2(row.extraBed)}</td><td>{n2(row.foodBev)}</td><td>{n2(row.miniBar)}</td><td>{n2(row.earlyClean)}</td><td>{n2(row.xerox)}</td><td>{n2(row.laundry)}</td><td>{n2(row.fax)}</td><td>{n2(row.spbuc)}</td><td>{n2(row.travels)}</td><td>{n2(row.misc)}</td><td><strong>{n2(row.dayTotal)}</strong></td><td><strong>{n2(row.grandTotal)}</strong></td></tr>)}</tbody>
            <tfoot><tr><td style={{textAlign:'center'}}><strong>Totals</strong></td><td><strong>{n2(totalRoomsCol)}</strong></td>{cats.map(c=><td key={c}><strong>{n2(colTotals[c])}</strong></td>)}<td><strong>{n2(d.subtotal||0)}</strong></td><td></td></tr></tfoot>
          </table>
          <table className="invoice-totals-table"><tbody>
            <tr><td>Total Amount</td><td>{n2(d.subtotal||0)}</td></tr>
            {(d.discountAmount||0)>0&&<tr><td>Discount ({n2(d.discountPercent||0)}%)</td><td>- {n2(d.discountAmount||0)}</td></tr>}
            <tr><td>SGST {n2(d.sgstPercent||0)}%</td><td>{n2(d.sgstAmount||0)}</td></tr>
            <tr><td>CGST {n2(d.cgstPercent||0)}%</td><td>{n2(d.cgstAmount||0)}</td></tr>
            <tr><td>Bill Amount</td><td>{n2(d.billAmount||0)}</td></tr>
            {(d.advancePaid||0)>0&&<tr><td>Less Advance</td><td>- {n2(d.advancePaid||0)}</td></tr>}
            <tr><td>Net Amount</td><td>{n2(d.netAmount||0)}</td></tr>
          </tbody></table>
          <div className="invoice-footer">
            <p>Linked Rooms: {d.roomNumbers||'-'}</p>
            <p className="amount-words">{numToWords(d.billAmount||0)}</p>
            <div className="invoice-signatures"><div>Guest's Signature</div><div>PLEASE DEPOSIT YOUR KEY</div><div>Admin / Front Office InCharge</div></div>
          </div>
        </div>
        <div className="preview-actions no-print"><button className="btn btn-primary" onClick={doPrint}><i className="fas fa-print"></i> Print</button><button className="btn btn-success" onClick={doPdf}><i className="fas fa-download"></i> Download PDF</button><button className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Close</button></div>
      </div></div></div>);
    }

    function CheckoutView({user}){
      const [roomNo,setRoomNo]=useState('');
      const [fetching,setFetching]=useState(false);
      const [ciData,setCiData]=useState(null);
      const [inv,setInv]=useState(null);
      const [saving,setSaving]=useState(false);
      const [payMode,setPayMode]=useState('Cash');
      const [amtPaid,setAmtPaid]=useState('');
      const [checkOutDate,setCheckOutDate]=useState(new Date().toISOString().split('T')[0]);
      const [checkOutTime,setCheckOutTime]=useState('12:00');

      const fetchRoom=()=>{
        if(!roomNo.trim()){Swal.fire({icon:'warning',text:'Enter a room number.'});return;}
        setFetching(true);setCiData(null);
        google.script.run.withSuccessHandler(res=>{setFetching(false);
          if(res){setCiData(res);}
          else Swal.fire({icon:'info',title:'Not Found',text:'No active check-in found for room #'+roomNo});
        }).withFailureHandler(e=>{setFetching(false);Swal.fire({icon:'error',text:e.message});}).getCheckInByRoomNo(roomNo);
      };

      const ci=ciData;
      const nights=ci?(()=>{const cin=new Date(ci.checkInDate);const cout=new Date(checkOutDate||new Date());const ms=cout.getTime()-cin.getTime();const n=Math.ceil(ms/(1000*60*60*24));return n<1?1:n;})():0;

      const doCheckout=()=>{
        if(!ci){Swal.fire({icon:'warning',text:'Fetch a room first.'});return;}
        setSaving(true);Swal.fire({title:'Processing Checkout...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        google.script.run.withSuccessHandler(res=>{
          Swal.close();setSaving(false);
          if(res.success){
            Swal.fire({icon:'success',title:'Checkout Complete!',text:res.message,timer:2500,showConfirmButton:false});
            if(res.invoiceData){setInv(res.invoiceData);}
            setCiData(null);setRoomNo('');
          }else Swal.fire({icon:'error',text:res.message});
        }).withFailureHandler(e=>{Swal.close();setSaving(false);Swal.fire({icon:'error',text:e.message});}).processFullCheckout(ci.checkInId,{checkOutDate,checkOutTime,paymentMode:payMode,amountPaid:parseFloat(amtPaid)||0});
      };

      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-sign-out-alt"></i> Checkout</h2></div>
        <div className="checkout-fetch-section">
          <div className="form-group"><label><i className="fas fa-bed"></i> Room Number</label><input value={roomNo} onChange={e=>setRoomNo(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')fetchRoom();}} placeholder="Enter room number..."/></div>
          <button className="btn btn-primary" onClick={fetchRoom} disabled={fetching} style={{height:'50px',marginBottom:'0'}}>{fetching?<i className="fas fa-spinner fa-spin"/>:<><i className="fas fa-search"></i> Fetch</>}</button>
        </div>

        {ci&&<>
          <div className="checkout-guest-info">
            <h4 style={{color:'var(--navy-primary)',marginBottom:'12px'}}><i className="fas fa-user"></i> Guest Details — {ci.checkInId}</h4>
            <div className="checkout-guest-grid">
              <p><strong>Guest:</strong> {ci.guestName}</p>
              <p><strong>Company:</strong> {ci.companyName||'-'}</p>
              <p><strong>GST No:</strong> {ci.gstNumber||'-'}</p>
              <p><strong>Mobile:</strong> {ci.mobile||'-'}</p>
              <p><strong>Email:</strong> {ci.email||'-'}</p>
              <p><strong>Address:</strong> {ci.address||'-'}</p>
              <p><strong>Rooms:</strong> {ci.roomNumbers}</p>
              <p><strong>Room Types:</strong> {ci.roomTypes||'-'}</p>
              <p><strong>No. of Rooms:</strong> {ci.numberOfRooms}</p>
              <p><strong>Check-In:</strong> {fmtDate(ci.checkInDate)} {ci.checkInTime}</p>
              <p><strong>Pax:</strong> {ci.pax}</p>
              <p><strong>Extra Person:</strong> {ci.extraPerson||0}</p>
              <p><strong>Food Plan:</strong> {ci.foodPlan}</p>
              <p><strong>Advance Paid:</strong> {fmtCur(ci.advancePaid)}</p>
              <p><strong>Bill To:</strong> {ci.billTo||'Individual'}</p>
              <p><strong>GST:</strong> {ci.gstType||'Excluding'}</p>
              <p><strong>Fix Rent:</strong> {ci.fixRoomRent==='Yes'?fmtCur(ci.fixRoomRentAmount):'No'}</p>
              <p><strong>Discount:</strong> {ci.discountPercent||0}%</p>
            </div>
          </div>

          <div className="checkout-bill-section">
            <h4><i className="fas fa-calculator"></i> Checkout Details</h4>
            <div className="form-grid">
              <div className="form-group"><label>Check-Out Date</label><input type="date" value={checkOutDate} onChange={e=>setCheckOutDate(e.target.value)}/></div>
              <div className="form-group"><label>Check-Out Time</label><input type="time" value={checkOutTime} onChange={e=>setCheckOutTime(e.target.value)}/></div>
              <div className="form-group"><label>Number of Nights</label><input value={nights} readOnly style={{background:'#f0f0f0'}}/></div>
              <div className="form-group"><label>Payment Mode</label><select value={payMode} onChange={e=>setPayMode(e.target.value)}><option>Cash</option><option>Card</option><option>Bank Transfer</option><option>UPI</option><option>Online</option></select></div>
              <div className="form-group"><label>Amount Paid ({APP_CURRENCY})</label><input type="number" step="0.01" min="0" value={amtPaid} onChange={e=>setAmtPaid(e.target.value)}/></div>
            </div>
          </div>

          <div className="form-actions">
            <button className="btn btn-primary" onClick={doCheckout} disabled={saving}>{saving?<><i className="fas fa-spinner fa-spin"></i> Processing...</>:<><i className="fas fa-sign-out-alt"></i> Complete Checkout & Generate Invoice</>}</button>
            <button className="btn btn-secondary" onClick={()=>{setCiData(null);setRoomNo('');}}><i className="fas fa-times"></i> Cancel</button>
          </div>
        </>}

        {inv&&<HotelInvoiceModal data={inv} onClose={()=>setInv(null)}/>}
      </div>);
    }

    function QuoteModal({quote,onClose,onSave,user}){
      const parseItems=(q)=>{try{return JSON.parse(q?.items||'[]');}catch(e){return[];}};
      const [fd,setFd]=useState({guestName:quote?.guestName||'',phone:quote?.phone||'',email:quote?.email||'',customerTIN:quote?.customerTIN||'',currency:quote?.currency||APP_CURRENCY,validUntil:quote?.validUntil?quote.validUntil.slice(0,10):'',status:quote?.status||'Draft',notes:quote?.notes||'',discount:quote?.discount||0,gstEnabled:quote?.gstEnabled||false,gstPercent:quote?.gstPercent||16,greenTaxEnabled:quote?.greenTaxEnabled||false,greenTaxPerNight:quote?.greenTaxPerNight||6,greenTaxPax:quote?.greenTaxPax||0,greenTaxNights:quote?.greenTaxNights||0});
      const [items,setItems]=useState(parseItems(quote));
      const [sv,setSv]=useState(false);
      const [customers,setCustomers]=useState([]);const [selCust,setSelCust]=useState('');
      const [availRooms,setAvailRooms]=useState([]);
      useEffect(()=>{google.script.run.withSuccessHandler(r=>{setCustomers(Array.isArray(r)?r:[]);}).withFailureHandler(()=>{}).getAllCustomers();google.script.run.withSuccessHandler(r=>{setAvailRooms((Array.isArray(r)?r:[]).filter(rm=>{const s=(rm.roomStatus||'').toLowerCase();return s==='available'||s==='reserved';}));}).withFailureHandler(()=>{}).getAllRooms();},[]);
      const pickCustomer=(val)=>{setSelCust(val);if(val){const c=customers.find(x=>x.customerId===val);if(c)setFd(p=>({...p,guestName:c.name||p.guestName,phone:c.phone||p.phone,email:c.email||p.email,customerTIN:c.customerTIN||p.customerTIN}));}};
      const addRoom=()=>setItems([...items,{type:'room',description:'',roomType:'Standard',quantity:1,nights:1,rate:0,amount:0,reservedRoomNo:''}]);
      const addActivity=()=>setItems([...items,{type:'activity',description:'',pax:1,rate:0,amount:0}]);
      const addSvc=()=>setItems([...items,{type:'service',description:'',amount:0}]);
      const upd=(idx,field,val)=>{const n=[...items];n[idx]={...n[idx],[field]:val};if(n[idx].type==='room'){const qty=parseFloat(n[idx].quantity)||1;const nts=parseFloat(n[idx].nights)||0;const rt=parseFloat(n[idx].rate)||0;n[idx].amount=qty*nts*rt;n[idx].description=(qty>1?qty+' x ':'')+n[idx].roomType+' Room - '+n[idx].nights+' Night(s)';}else if(n[idx].type==='activity'){const px=parseFloat(n[idx].pax)||1;const r=parseFloat(n[idx].rate)||0;n[idx].amount=px*r;}setItems(n);};
      const rem=(idx)=>setItems(items.filter((_,i)=>i!==idx));
      const subTotal=items.reduce((s,it)=>s+(parseFloat(it.amount)||0),0);
      const disc=parseFloat(fd.discount)||0;
      const gstAmt=fd.gstEnabled?(subTotal-disc)*(parseFloat(fd.gstPercent)||0)/100:0;
      const gtAmt=fd.greenTaxEnabled?(parseFloat(fd.greenTaxPerNight)||0)*(parseFloat(fd.greenTaxPax)||0)*(parseFloat(fd.greenTaxNights)||0):0;
      const total=subTotal-disc+gstAmt+gtAmt;
      const buildPdfData=(quoteId)=>({quoteId:quoteId||'',guestName:fd.guestName,phone:fd.phone,email:fd.email,customerTIN:fd.customerTIN,currency:fd.currency,createdDate:new Date().toISOString(),validUntil:fd.validUntil,status:fd.status,items:JSON.stringify(items),subTotal,discount:disc,gstEnabled:fd.gstEnabled,gstPercent:fd.gstPercent,gstAmount:gstAmt,greenTaxEnabled:fd.greenTaxEnabled,greenTaxPerNight:fd.greenTaxPerNight,greenTaxPax:fd.greenTaxPax,greenTaxNights:fd.greenTaxNights,greenTaxAmount:gtAmt,totalAmount:total,notes:fd.notes});
      const onSuccess=(r,isEdit)=>{setSv(false);if(r.success){
        const pdfData=buildPdfData(isEdit?quote.quoteId:r.quoteId);
        Swal.fire({icon:'success',title:'Quote Saved!',text:r.message,showCancelButton:true,confirmButtonText:'<i class="fas fa-file-pdf"></i> Download PDF',cancelButtonText:'Close',confirmButtonColor:'#001f3f'}).then(res=>{if(res.isConfirmed)downloadQuotePdf(pdfData);});
        onClose();setTimeout(onSave,100);
      }else Swal.fire({icon:'error',text:r.message});};
      const submit=(e)=>{e.preventDefault();if(items.length===0){Swal.fire({icon:'warning',text:'Add at least one item'});return;}setSv(true);
        const qd={...fd,items:JSON.stringify(items),subTotal,gstAmount:gstAmt,greenTaxAmount:gtAmt,totalAmount:total,createdBy:user};
        if(quote){google.script.run.withSuccessHandler(r=>onSuccess(r,true)).withFailureHandler(e=>{setSv(false);Swal.fire({icon:'error',text:e.message});}).updateQuote(quote.rowIndex,qd);}
        else{google.script.run.withSuccessHandler(r=>onSuccess(r,false)).withFailureHandler(e=>{setSv(false);Swal.fire({icon:'error',text:e.message});}).addQuote(qd);}};
      return(<div className="modal-overlay" onClick={onClose}><div className="modal modal-wide" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3><i className="fas fa-file-invoice"></i> {quote?'Edit':'New'} Quote</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body"><form onSubmit={submit}>
        {!quote&&customers.length>0&&<div className="form-group"><label><i className="fas fa-user-tag"></i> Select Customer (auto-fills guest info)</label><SearchableSelect value={selCust} onChange={pickCustomer} options={[{value:'',label:'-- Manual Entry --'},...customers.map(c=>({value:c.customerId,label:c.name+(c.email?' ('+c.email+')':'')}))] } placeholder="Search customer..." /></div>}
        <div className="form-grid">
          <div className="form-group"><label>Guest Name *</label><input value={fd.guestName} onChange={e=>setFd({...fd,guestName:e.target.value})} required/></div>
          <div className="form-group"><label>Phone</label><input value={fd.phone} onChange={e=>setFd({...fd,phone:e.target.value})}/></div>
          <div className="form-group"><label>Email</label><input type="email" value={fd.email} onChange={e=>setFd({...fd,email:e.target.value})}/></div>
          <div className="form-group"><label>Customer TIN</label><input value={fd.customerTIN} onChange={e=>setFd({...fd,customerTIN:e.target.value})} placeholder="Optional"/></div>
          <div className="form-group"><label>Valid Until</label><input type="date" value={fd.validUntil} onChange={e=>setFd({...fd,validUntil:e.target.value})}/></div>
          <div className="form-group"><label>Status</label><select value={fd.status} onChange={e=>setFd({...fd,status:e.target.value})}><option>Draft</option><option>Sent</option><option>Accepted</option><option>Expired</option></select></div>
          <div className="form-group"><label>Currency</label><select value={fd.currency} onChange={e=>setFd({...fd,currency:e.target.value})} style={{fontSize:'16px'}}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>

        tRef.current=t;}catch(e){console.error(e);}},150);};

    function InvoiceModal({invoice,onClose,onSave,user}){
      const [fd,setFd]=useState({guestName:invoice?.guestName||'',phone:invoice?.phone||'',email:invoice?.email||'',customerTIN:invoice?.customerTIN||'',currency:invoice?.currency||APP_CURRENCY,dueDate:invoice?.dueDate?invoice.dueDate.slice(0,10):'',status:invoice?.status||'Draft',notes:invoice?.notes||'',discount:invoice?.discount||0,gstEnabled:invoice?.gstEnabled||false,gstPercent:invoice?.gstPercent||16,greenTaxEnabled:invoice?.greenTaxEnabled||false,greenTaxPerNight:invoice?.greenTaxPerNight||6,greenTaxPax:invoice?.greenTaxPax||0,greenTaxNights:invoice?.greenTaxNights||0});
      const [items,setItems]=useState(()=>{try{return JSON.parse(typeof invoice?.items==='string'?invoice.items:'[]');}catch(e){return[];}});
      const [sv,setSv]=useState(false);
      const [customers,setCustomers]=useState([]);const [selCust,setSelCust]=useState('');
      useEffect(()=>{google.script.run.withSuccessHandler(r=>{setCustomers(Array.isArray(r)?r:[]);}).withFailureHandler(()=>{}).getAllCustomers();},[]);
      const pickCustomer=(val)=>{setSelCust(val);if(val){const c=customers.find(x=>x.customerId===val);if(c)setFd(p=>({...p,guestName:c.name||p.guestName,phone:c.phone||p.phone,email:c.email||p.email,customerTIN:c.customerTIN||p.customerTIN}));}};
      const addRoom=()=>setItems([...items,{type:'room',roomType:'Standard',quantity:1,nights:1,rate:0,amount:0}]);
      const addActivity=()=>setItems([...items,{type:'activity',description:'',pax:1,rate:0,amount:0}]);
      const addService=()=>setItems([...items,{type:'service',description:'',amount:0}]);
      const upd=(idx,f,v)=>{const n=[...items];n[idx]={...n[idx],[f]:v};if(n[idx].type==='room'){const q=parseFloat(n[idx].quantity)||1;const nt=parseFloat(n[idx].nights)||0;const r=parseFloat(n[idx].rate)||0;n[idx].amount=q*nt*r;}else if(n[idx].type==='activity'){const px=parseFloat(n[idx].pax)||1;const r=parseFloat(n[idx].rate)||0;n[idx].amount=px*r;}setItems(n);};
      const rem=(idx)=>setItems(items.filter((_,i)=>i!==idx));
      const subTotal=items.reduce((s,it)=>s+(parseFloat(it.amount)||0),0);
      const disc=parseFloat(fd.discount)||0;
      const gstAmt=fd.gstEnabled?(subTotal-disc)*(parseFloat(fd.gstPercent)||0)/100:0;
      const gtAmt=fd.greenTaxEnabled?(parseFloat(fd.greenTaxPerNight)||0)*(parseFloat(fd.greenTaxPax)||0)*(parseFloat(fd.greenTaxNights)||0):0;
      const total=subTotal-disc+gstAmt+gtAmt;
      const submit=(e)=>{e.preventDefault();if(items.length===0)return Swal.fire({icon:'warning',text:'Add at least one item.'});setSv(true);
        const data={...fd,items:JSON.stringify(items),subTotal,gstAmount:gstAmt,greenTaxAmount:gtAmt,totalAmount:total,createdBy:user};

        else{google.script.run.withSuccessHandler(r=>{setSv(false);if(r.success){Swal.fire({icon:'success',text:r.message,timer:2000,showConfirmButton:false});onClose();setTimeout(onSave,100);}else Swal.fire({icon:'error',text:r.message});}).withFailureHandler(e=>{setSv(false);Swal.fire({icon:'error',text:e.message});}).addInvoice(data);}};
      return(<div className="modal-overlay" onClick={onClose}><div className="modal modal-wide" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3><i className="fas fa-file-invoice-dollar"></i> {invoice?'Edit':'New'} Invoice</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body"><form onSubmit={submit}>

            {roomItems.map((it,i)=><tr key={'r'+i}><td>{it.roomType||'Room'}</td><td>{it.quantity||1} room(s) x {it.nights} night(s) x {fc(it.rate)}</td><td className="right">{fc(it.amount)}</td></tr>)}

            {invoice.discount>0&&<tr><td colSpan="2">Discount</td><td className="right">- {fc(invoice.discount)}</td></tr>}
            {invoice.gstEnabled&&<tr><td colSpan="2">GST ({invoice.gstPercent}%)</td><td className="right">{fc(invoice.gstAmount)}</td></tr>}
            {invoice.greenTaxEnabled&&<tr><td colSpan="2">Green Tax ({cur} {invoice.greenTaxPerNight} x {invoice.greenTaxPax} pax x {invoice.greenTaxNights} nights)</td><td className="right">{fc(invoice.greenTaxAmount)}</td></tr>}
            <tr className="total-row"><td colSpan="2"><strong>TOTAL</strong></td><td className="right"><strong>{fc(invoice.totalAmount)}</strong></td></tr>
          </tbody></table>
          {invoice.notes&&<p style={{marginTop:'15px',fontStyle:'italic',color:'#666'}}>Notes: {invoice.notes}</p>}

    function InvoicesView({user}){
      const [ld,setLd]=useState(true);const [show,setShow]=useState(false);const [edit,setEdit]=useState(null);const [preview,setPreview]=useState(null);const tRef=useRef(null);const [recs,setRecs]=useState([]);
      const [filters,setFilters]=useState({dateFrom:'',dateTo:'',status:'',currency:''});
      useEffect(()=>{load();return()=>{if(tRef.current)try{tRef.current.destroy();}catch(e){}};},[]);
      const load=()=>{setLd(true);
        google.script.run.withSuccessHandler(odRes=>{
          google.script.run.withSuccessHandler(r=>{const d=Array.isArray(r)?r:[];setRecs(d);setLd(false);initT(d);
            if(odRes&&odRes.overdueCount>0)Swal.fire({icon:'warning',title:'Overdue Invoices',text:odRes.overdueCount+' invoice(s) are now overdue!',timer:4000,showConfirmButton:false});
          }).withFailureHandler(e=>{setLd(false);Swal.fire({icon:'error',text:e.message});}).getAllInvoices();
        }).withFailureHandler(()=>{
          google.script.run.withSuccessHandler(r=>{const d=Array.isArray(r)?r:[];setRecs(d);setLd(false);initT(d);}).withFailureHandler(e=>{setLd(false);Swal.fire({icon:'error',text:e.message});}).getAllInvoices();
        }).checkOverdueInvoices();};
      const initT=(data)=>{if(tRef.current){try{tRef.current.destroy();tRef.current=null;$('#invT').empty();}catch(e){}}
        setTimeout(()=>{try{$.fn.dataTable.ext.search=[];const t=$('#invT').DataTable({data,destroy:true,columns:[
          {data:'invoiceId',title:'Invoice #'},{data:'guestName',title:'Guest'},{data:'createdDate',title:'Date',render:d=>fmtDate(d)},{data:'dueDate',title:'Due',render:d=>fmtDate(d)},
          {data:'status',title:'Status',render:d=>`<span class="status-badge ${statusCls(d)}">${d}</span>`},{data:'currency',title:'Cur'},{data:'totalAmount',title:'Total',render:(d,t,row)=>fmtCur(d,row.currency)},
          {data:null,title:'Actions',orderable:false,className:'all',responsivePriority:1,render:()=>'<button class="action-icon view-icon" data-action="view"><i class="fas fa-eye"></i></button><button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon" data-action="email" title="Email Invoice" style="color:#0074D9"><i class="fas fa-envelope"></i></button><button class="action-icon" data-action="pdf" style="color:#001f3f"><i class="fas fa-file-pdf"></i></button><button class="action-icon" data-action="drive" style="color:#34a853"><i class="fas fa-cloud-upload-alt"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}
        ],pageLength:10,lengthMenu:[[10,25,50,-1],[10,25,50,"All"]],responsive:true,dom:'Blfrtip',buttons:[
          {extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},{extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},{extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}],order:[[2,'desc']]});
        $('#invT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();
          if(a==='view')setPreview(rd);else if(a==='edit'){setEdit(rd);setShow(true);}else if(a==='email')emailInv(rd);else if(a==='pdf')downloadInvoicePdf(rd);else if(a==='drive')savePdfToDriveHelper(rd,'invoice');else if(a==='delete')delRec(rd);});
        tRef.current=t;}catch(e){console.error(e);}},150);};
      const delRec=(rec)=>{Swal.fire({icon:'warning',title:'Delete?',text:'Delete invoice '+rec.invoiceId+'?',showCancelButton:true,confirmButtonColor:'#ea4335',confirmButtonText:'Delete'}).then(r=>{if(r.isConfirmed)google.script.run.withSuccessHandler(res=>{if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});setTimeout(load,100);}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>Swal.fire({icon:'error',text:e.message})).deleteInvoice(rec.rowIndex);});};
      const emailInv=(inv)=>{if(!inv.email)return Swal.fire({icon:'warning',text:'No email address on this invoice.'});Swal.fire({icon:'question',title:'Email Invoice?',text:'Send invoice '+inv.invoiceId+' to '+inv.email+'?',showCancelButton:true,confirmButtonColor:'#001f3f',confirmButtonText:'Send Email'}).then(r=>{if(r.isConfirmed){Swal.fire({title:'Sending email...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});google.script.run.withSuccessHandler(res=>{Swal.close();if(res.success)Swal.fire({icon:'success',text:res.message,timer:3000,showConfirmButton:false});else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>{Swal.close();Swal.fire({icon:'error',text:e.message});}).emailInvoice(inv.invoiceId);}});};
      useEffect(()=>{if(!tRef.current||recs.length===0)return;$.fn.dataTable.ext.search=[];
        $.fn.dataTable.ext.search.push(function(s,d,idx){const row=recs[idx];if(!row)return true;if(filters.dateFrom){const dt=new Date(row.createdDate);if(dt<new Date(filters.dateFrom))return false;}if(filters.dateTo){const dt=new Date(row.createdDate);if(dt>new Date(filters.dateTo+'T23:59:59'))return false;}return true;});
        if(filters.status)tRef.current.column(4).search('^'+filters.status+'$',true,false);else tRef.current.column(4).search('');
        if(filters.currency)tRef.current.column(5).search(filters.currency);else tRef.current.column(5).search('');
        tRef.current.draw();},[filters]);
      const clearF=()=>{setFilters({dateFrom:'',dateTo:'',status:'',currency:''});if(tRef.current){$.fn.dataTable.ext.search=[];tRef.current.columns().search('').draw();}};

          <div className="filter-group"><label><i className="fas fa-money-bill"></i> Currency</label><select className="filter-input" value={filters.currency} onChange={e=>setFilters({...filters,currency:e.target.value})}><option value="">All</option>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        </div></div>}
        {ld&&<TableSkeleton rows={5} columns={7}/>}<div style={{display:ld?'none':'block'}}><table id="invT" className="display" style={{width:'100%'}}></table></div>
        {show&&<InvoiceModal invoice={edit} onClose={()=>{setShow(false);setEdit(null);}} onSave={load} user={user}/>}
        {preview&&<InvoicePreviewModal invoice={preview} onClose={()=>setPreview(null)}/>}
      </div>);
    }

    function CategoryManager({onClose}){

      const load=()=>{setLd(true);google.script.run.withSuccessHandler(r=>{setLd(false);setCats(Array.isArray(r)?r:[]);}).withFailureHandler(()=>setLd(false)).getAllCategories();};

        google.script.run.withSuccessHandler(r=>{if(r.success)load();else Swal.fire({icon:'error',text:r.message});}).deleteCategory(cat.rowIndex);};
      return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3><i className="fas fa-tags"></i> Manage Categories</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body">

          <select value={type} onChange={e=>setType(e.target.value)} style={{padding:'10px',border:'1.5px solid #d0d0d0',borderRadius:'3px',fontSize:'16px'}}><option>Income</option><option>Expense</option></select>

          <h4 style={{color:'var(--navy-primary)',marginTop:'20px',marginBottom:'10px'}}>Income Categories</h4>

        </div>}
      </div></div></div>);
    }

    function CalendarView({user,role}){
      const [loading,setLoading]=useState(true);const [bookings,setBookings]=useState([]);
      const [currentDate,setCurrentDate]=useState(new Date());const [selectedBooking,setSelectedBooking]=useState(null);
      const isAdmin=role==='admin';

      useEffect(()=>{loadBookings();},[]);
      const loadBookings=()=>{setLoading(true);google.script.run.withSuccessHandler(r=>{setLoading(false);const data=Array.isArray(r)?r:[];const filtered=isAdmin?data:data.filter(b=>b.email===user);setBookings(filtered);}).withFailureHandler(e=>{setLoading(false);Swal.fire({icon:'error',text:e.message});}).getAllBookings();};

      const prevMonth=()=>{const d=new Date(currentDate);d.setMonth(d.getMonth()-1);setCurrentDate(d);};
      const nextMonth=()=>{const d=new Date(currentDate);d.setMonth(d.getMonth()+1);setCurrentDate(d);};
      const goToday=()=>setCurrentDate(new Date());

      const year=currentDate.getFullYear();const month=currentDate.getMonth();
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      const daysInPrevMonth=new Date(year,month,0).getDate();

      const cells=[];
      for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrevMonth-i,isOther:true,date:new Date(year,month-1,daysInPrevMonth-i)});
      for(let d=1;d<=daysInMonth;d++)cells.push({day:d,isOther:false,date:new Date(year,month,d)});
      const rem=7-(cells.length%7);if(rem<7)for(let i=1;i<=rem;i++)cells.push({day:i,isOther:true,date:new Date(year,month+1,i)});

      const getBookingsForDate=(date)=>{
        const dayStart=new Date(date.getFullYear(),date.getMonth(),date.getDate());
        const dayEnd=new Date(dayStart);dayEnd.setDate(dayEnd.getDate()+1);
        return bookings.filter(b=>{if(!b.checkIn||!b.checkOut)return false;const ci=new Date(b.checkIn);const co=new Date(b.checkOut);return ci<dayEnd&&co>dayStart;});
      };

      const today=new Date();
      const isToday=(date)=>date.getDate()===today.getDate()&&date.getMonth()===today.getMonth()&&date.getFullYear()===today.getFullYear();
      const isPast=(date)=>{const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());return d<t;};
      const isFuture=(date)=>{const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());return d>t;};
      const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      const showMoreBookings=(dayBookings,dateStr)=>{
        const html=dayBookings.map(bk=>'<div style="padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;display:flex;align-items:center;gap:8px" class="swal-bk-row" data-ticket="'+bk.ticketId+'"><span class="status-badge '+(bk.status==='Booked'?'status-booked':'status-checkedout')+'">'+bk.status+'</span> <strong>#'+bk.roomNo+'</strong> '+bk.guestName+'</div>').join('');
        Swal.fire({title:'Bookings on '+dateStr,html:'<div style="max-height:300px;overflow-y:auto">'+html+'</div>',showConfirmButton:false,showCloseButton:true,width:420,didOpen:()=>{document.querySelectorAll('.swal-bk-row').forEach(el=>{el.addEventListener('click',()=>{const tid=el.getAttribute('data-ticket');const bk=dayBookings.find(b=>b.ticketId===tid);if(bk){Swal.close();setSelectedBooking(bk);}});});}});
      };

      if(loading)return <div className="data-section"><TableSkeleton rows={5} columns={7}/></div>;

      return(<div className="data-section"><div className="calendar-container">
        <div className="calendar-header"><h3><i className="fas fa-calendar-alt" style={{marginRight:'10px'}}></i>{monthNames[month]} {year}</h3>
          <div className="calendar-nav"><button onClick={prevMonth}><i className="fas fa-chevron-left"></i></button><button onClick={goToday}>Today</button><button onClick={nextMonth}><i className="fas fa-chevron-right"></i></button></div>
        </div>
        <div className="calendar-grid">
          {dayNames.map(d=><div key={d} className="calendar-day-header">{d}</div>)}
          {cells.map((cell,idx)=>{
            const dayBookings=cell.isOther?[]:getBookingsForDate(cell.date);
            const cls=['calendar-cell'];if(cell.isOther)cls.push('other-month');if(!cell.isOther&&isToday(cell.date)){cls.push('today');cls.push('current-date');}else if(!cell.isOther&&isPast(cell.date))cls.push('past-date');else if(!cell.isOther&&isFuture(cell.date))cls.push('future-date');
            const maxVisible=4;
            const dateStr=fmtDate(cell.date.toISOString());
            return(<div key={idx} className={cls.join(' ')}><div className="calendar-date">{cell.day}</div>
              {dayBookings.slice(0,maxVisible).map((bk,i)=>(<div key={bk.ticketId+'-'+i} className={'calendar-booking '+(bk.status==='Booked'?'cal-booked':'cal-checkedout')} onClick={()=>setSelectedBooking(bk)} title={bk.guestName+' - Room #'+bk.roomNo}>#{bk.roomNo} {(bk.guestName||'').split(' ')[0]}</div>))}
              {dayBookings.length>maxVisible&&<div style={{fontSize:'10px',color:'var(--navy-accent)',padding:'2px 6px',cursor:'pointer',fontWeight:'600'}} onClick={()=>showMoreBookings(dayBookings,dateStr)}>+{dayBookings.length-maxVisible} more</div>}
            </div>);
          })}
        </div>
      </div>
      {selectedBooking&&<BookingDetailModal booking={selectedBooking} onClose={()=>setSelectedBooking(null)}/>}
      </div>);
    }

    function AIChatView({user,role}){
      const chatKey='mri_chat_'+user;
      const [msgs,setMsgs]=useState(()=>{try{const s=localStorage.getItem(chatKey);return s?JSON.parse(s):[];}catch(e){return[];}});
      const [input,setInput]=useState('');
      const [loading,setLoading]=useState(false);
      const msgEnd=useRef(null);
      const scrollBottom=()=>{setTimeout(()=>{if(msgEnd.current)msgEnd.current.scrollIntoView({behavior:'smooth'});},100);};
      const isAdmin=role==='admin';

      // Save msgs to localStorage whenever they change
      useEffect(()=>{try{localStorage.setItem(chatKey,JSON.stringify(msgs));}catch(e){}},[msgs]);
      // Scroll to bottom on load if there are messages
      useEffect(()=>{if(msgs.length>0)scrollBottom();},[]);

      const send=(q)=>{
        const question=(q||input).trim();
        if(!question||loading)return;
        const newMsgs=[...msgs,{role:'user',text:question,time:new Date()}];
        setMsgs(newMsgs);setInput('');setLoading(true);scrollBottom();
        // Build chat history for context (strip time, keep role+text only)
        const history=msgs.map(m=>({role:m.role,text:m.text}));
        google.script.run.withSuccessHandler((r)=>{
          setLoading(false);
          const updated=r.success
            ?[...newMsgs,{role:'ai',text:r.reply,time:new Date()}]
            :[...newMsgs,{role:'ai',text:'<span style="color:#ea4335">'+(r.message||'Something went wrong.')+'</span>',time:new Date()}];
          setMsgs(updated);
          scrollBottom();
        }).withFailureHandler((e)=>{
          setLoading(false);
          setMsgs([...newMsgs,{role:'ai',text:'<span style="color:#ea4335">Connection error: '+e.message+'</span>',time:new Date()}]);
          scrollBottom();
        }).askAIAssistant(question,user,role,history);
      };

      const clearChat=()=>{Swal.fire({title:'Clear Conversation?',text:'This will remove all messages from this chat.',icon:'question',showCancelButton:true,confirmButtonColor:'#001f3f',cancelButtonColor:'#6c757d',confirmButtonText:'Yes, clear it'}).then(r=>{if(r.isConfirmed){setMsgs([]);try{localStorage.removeItem(chatKey);}catch(e){}}});};

      const handleKey=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

      const suggestions=isAdmin?['Monthly revenue breakdown','Total income vs expenses','Show all bookings','Show overdue invoices']:['What are my bookings?','My checkout details','My booking status','My payment summary'];

      const fmtTime=(d)=>{if(!d)return '';return new Date(d).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});};

      return(<div className="chat-container">
        <div className="chat-header">
          <div className="chat-header-avatar"><i className="fas fa-robot"></i></div>
          <div className="chat-header-info"><h3>AI Assistant</h3><span>{isAdmin?'Full access to hotel data':'Access to your bookings'}</span></div>
          {msgs.length>0&&<button className="chat-clear-btn" onClick={clearChat} title="Clear Conversation"><i className="fas fa-trash-alt"></i></button>}
        </div>
        <div className="chat-messages">
          {msgs.length===0&&<div className="chat-welcome">
            <i className="fas fa-robot"></i>
            <h4>Hello, {user}!</h4>
            <p className="chat-subtitle">{isAdmin?'Your AI-powered hotel management assistant. Ask me anything about your hotel data.':'I\'m here to help you with your booking information and stay details.'}</p>
            <div className="chat-capabilities">
              {isAdmin?<>
                <div className="chat-cap-card"><i className="fas fa-bed"></i><div><strong>Bookings & Rooms</strong>View occupancy, guest details, and booking status</div></div>
                <div className="chat-cap-card"><i className="fas fa-chart-line"></i><div><strong>Revenue & Finance</strong>Monthly income, expenses, profit breakdowns</div></div>
                <div className="chat-cap-card"><i className="fas fa-file-invoice-dollar"></i><div><strong>Invoices & Quotes</strong>Track payments, overdue invoices, and quotations</div></div>
                <div className="chat-cap-card"><i className="fas fa-users"></i><div><strong>Users & Budgets</strong>Staff info, monthly budgets, and spending</div></div>
              </>:<>
                <div className="chat-cap-card"><i className="fas fa-calendar-check"></i><div><strong>My Bookings</strong>Check-in/out dates, room info, and status</div></div>
                <div className="chat-cap-card"><i className="fas fa-receipt"></i><div><strong>Payment Details</strong>Amount due, payment status, and balance</div></div>
              </>}
            </div>
            <div className="chat-divider">Try asking</div>
            <div className="chat-suggestions">{suggestions.map((s,i)=><button key={i} onClick={()=>send(s)}>{s}</button>)}</div>
            <p style={{fontSize:'11px',color:'#aaa',marginTop:'16px'}}>Your conversation is saved locally and remembered across sessions. Use <i className="fas fa-trash-alt" style={{fontSize:'10px'}}></i> to clear.</p>
          </div>}
          {msgs.map((m,i)=><div key={i} className={`chat-bubble ${m.role}`}>{m.role==='ai'?<div dangerouslySetInnerHTML={{__html:m.text}}/>:m.text}<div className="chat-bubble-time">{fmtTime(m.time)}</div></div>)}
          {loading&&<div className="typing-indicator"><div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div></div>}
          <div ref={msgEnd}/>
        </div>
        <div className="chat-input-bar">
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder={isAdmin?'Ask about hotel data...':'Ask about your bookings...'} disabled={loading}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()}><i className={loading?'fas fa-spinner fa-spin':'fas fa-paper-plane'}></i></button>
        </div>
      </div>);
    }

    function MainContent({activeMenu,user,role}){
      switch(activeMenu){
        case 'dashboard': return <DashboardView user={user}/>;
        case 'bookings': return <BookingsView user={user} role={role}/>;
        case 'calendar': return <CalendarView user={user} role={role}/>;
        case 'checkin': return <CheckInView user={user} role={role}/>;
        case 'checkout': return <CheckoutView user={user}/>;
        case 'restaurant': return <RestaurantView user={user}/>;
        case 'rooms': return <RoomsView user={user}/>;
        case 'kanban': return <KanbanView user={user}/>;
        case 'customers': return <CustomersView user={user}/>;
        case 'quotes': return <QuotesView user={user}/>;
        case 'invoices': return <InvoicesView user={user}/>;
        case 'finance': return <FinanceView user={user}/>;
        case 'reports': return <ReportsView user={user}/>;
        case 'settings': return <SettingsView user={user}/>;
        case 'users': return <UsersView user={user}/>;
        case 'account': return <AccountView user={user}/>;
        case 'about': return <AboutView/>;
        case 'aichat': return <AIChatView user={user} role={role}/>;
        default: return null;
      }
    }

    function Dashboard({user,role,onLogout}){
      const [am,setAm]=useState(role==='admin'?'dashboard':'bookings');
      const [so,setSo]=useState(false);
      return(<div className="app-container"><Sidebar activeMenu={am} setActiveMenu={setAm} role={role} user={user} onLogout={onLogout} isOpen={so} setIsOpen={setSo}/><div className="main-content"><div className="header"><div style={{display:'flex',alignItems:'center',gap:'10px'}}><button className="hamburger" onClick={()=>setSo(!so)}><i className="fas fa-bars"></i></button><h1><i className="fas fa-hotel"></i> Hill View Eco Retreat</h1></div><div style={{fontSize:'14px',color:'#666'}}>Welcome, {user}</div></div><MainContent activeMenu={am} user={user} role={role}/></div><BottomNav activeMenu={am} setActiveMenu={setAm} role={role} onLogout={onLogout}/></div>);
    }

    const SESSION_TIMEOUT = 60 * 60 * 1000; // 1 hour in ms

    function App(){
      const getSession=()=>{try{const s=localStorage.getItem('mri_session');if(!s)return null;const d=JSON.parse(s);if(Date.now()-d.loginTime>=SESSION_TIMEOUT){localStorage.removeItem('mri_session');return null;}return d;}catch(e){localStorage.removeItem('mri_session');return null;}};
      const saved=getSession();
      const [li,setLi]=useState(!!saved);const [cu,setCu]=useState(saved?saved.user:null);const [ur,setUr]=useState(saved?saved.role:null);

      const doLogout=()=>{localStorage.removeItem('mri_session');setLi(false);setCu(null);setUr(null);};

      const handleLogin=(u,r)=>{const session={user:u,role:r,loginTime:Date.now()};localStorage.setItem('mri_session',JSON.stringify(session));setLi(true);setCu(u);setUr(r);};

      // Check session expiry every 30 seconds
      useEffect(()=>{
        if(!li)return;
        const timer=setInterval(()=>{
          const s=getSession();
          if(!s){
            clearInterval(timer);
            doLogout();
            Swal.fire({icon:'info',title:'Session Expired',text:'Your session has expired after 1 hour. Please login again.',confirmButtonColor:'#001f3f'});
          }
        },30000);
        return()=>clearInterval(timer);
      },[li]);

      return(<div>{!li?<LoginPage onLogin={handleLogin}/>:<Dashboard user={cu} role={ur} onLogout={doLogout}/>}</div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
